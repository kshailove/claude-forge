# claude-forge project registry
# Format: project-name=path
# Paths are relative to this file (the claude-forge root), or absolute.
#
# Each project lives in its own directory (and its own git repo) outside
# of claude-forge, so you can make each one public, private, or untracked
# independently.
#
# Examples:
#   mywebsite=../mywebsite
#   engg-intelligence=../engg-intelligence
#   work-tool=/Users/me/work/some-tool
#
# Add your projects below:
engg-intelligence=../engg-intelligence
sdr=../sdr
mywebsite=../mywebsite
