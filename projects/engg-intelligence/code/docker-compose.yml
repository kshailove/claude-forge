# Path A — TimescaleDB (self-hosted, recommended)
# Uses timescale/timescaledb:latest-pg16 for full hypertable + continuous aggregate support.
# See docker-compose.vanilla.yml for managed-PostgreSQL (Path B) variant.

services:

  db:
    image: timescale/timescaledb:latest-pg16
    container_name: engg_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: engg
      POSTGRES_PASSWORD: engg
      POSTGRES_DB: engg_intelligence
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engg -d engg_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: engg_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: engg_api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      USE_TIMESCALEDB: "true"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: engg_worker
    restart: unless-stopped
    command: >
      celery -A app.celery_app worker
      --queues=q_github,q_jira_clickup,q_incidents,q_slack,q_keka,q_digest
      --loglevel=info
      --concurrency=4
    env_file:
      - .env
    environment:
      USE_TIMESCALEDB: "true"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: engg_beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    env_file:
      - .env
    environment:
      USE_TIMESCALEDB: "true"
    volumes:
      - ./backend:/app
      - beatdata:/app/celerybeat-schedule
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: engg_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"

  grafana:
    image: grafana/grafana:latest
    container_name: engg_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro

volumes:
  pgdata:
  redisdata:
  beatdata:
  grafanadata:
