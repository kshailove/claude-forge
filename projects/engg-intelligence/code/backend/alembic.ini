# Alembic configuration file
# See https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration file names
# file_template = %%(rev)s_%%(slug)s
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Timezone to use when rendering the date within the migration file
# Leave blank for UTC
timezone = UTC

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Version path separator (":" by default on Windows, ";" on POSIX)
version_path_separator = os

# The output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# SQLAlchemy URL — overridden at runtime by env.py reading from DATABASE_URL env var
# This value is a placeholder; real connection string comes from environment
sqlalchemy.url = postgresql+asyncpg://engg:engg@db:5432/engg_intelligence


[post_write_hooks]
# Post-write hooks define scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "black" - use the console_scripts runner,
# against the "black" entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
