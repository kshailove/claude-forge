global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "fastapi"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  - job_name: "celery"
    # Celery metrics exported via celery-exporter (add in M9)
    static_configs:
      - targets: ["celery-exporter:9808"]
    scrape_interval: 30s
