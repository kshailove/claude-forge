apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "engg-intelligence.fullname" . }}-worker-incidents
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "engg-intelligence.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker-incidents
spec:
  replicas: {{ .Values.workers.incidents.replicaCount }}
  selector:
    matchLabels:
      {{- include "engg-intelligence.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker-incidents
  template:
    metadata:
      labels:
        {{- include "engg-intelligence.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker-incidents
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker-incidents
          image: {{ include "engg-intelligence.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - celery
            - -A
            - app.celery_app
            - worker
            - --queues={{ .Values.workers.incidents.queues }}
            - --loglevel=info
            - --concurrency={{ .Values.workers.incidents.concurrency }}
          envFrom:
            - secretRef:
                name: {{ include "engg-intelligence.secretName" . }}
          resources:
            {{- toYaml .Values.workers.incidents.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
