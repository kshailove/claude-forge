apiVersion: v1
kind: Secret
metadata:
  name: {{ include "engg-intelligence.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "engg-intelligence.labels" . | nindent 4 }}
  annotations:
    # Helm manages this Secret. Update values in custom-values.yaml.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
