# Path B — Vanilla PostgreSQL (managed DB variant)
# Use this when TimescaleDB is unavailable (RDS, Cloud SQL, Azure Database for PostgreSQL).
# Set USE_TIMESCALEDB=false — migrations will use declarative range partitioning instead of
# hypertables. Continuous aggregates are replaced by Celery-driven materialized view refreshes.
# See docs/deployment/timescaledb-to-vanilla-migration.md for trade-offs.

services:

  db:
    image: postgres:16-alpine
    container_name: engg_db_vanilla
    restart: unless-stopped
    environment:
      POSTGRES_USER: engg
      POSTGRES_PASSWORD: engg
      POSTGRES_DB: engg_intelligence
    ports:
      - "5432:5432"
    volumes:
      - pgdata_vanilla:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engg -d engg_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: engg_redis_vanilla
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata_vanilla:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: engg_api_vanilla
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      USE_TIMESCALEDB: "false"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: engg_worker_vanilla
    restart: unless-stopped
    command: >
      celery -A app.celery_app worker
      --queues=q_github,q_jira_clickup,q_incidents,q_slack,q_keka,q_digest
      --loglevel=info
      --concurrency=4
    env_file:
      - .env
    environment:
      USE_TIMESCALEDB: "false"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: engg_beat_vanilla
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    env_file:
      - .env
    environment:
      USE_TIMESCALEDB: "false"
    volumes:
      - ./backend:/app
      - beatdata_vanilla:/app/celerybeat-schedule
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata_vanilla:
  redisdata_vanilla:
  beatdata_vanilla:
